<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reset your EventSyncEngine password" />
    <title>Reset Password — EventSyncEngine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/enhancements.css" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #030712;
            --surface: #0a0f1e;
            --border: rgba(99, 102, 241, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.35);
            --text: #e2e8f0;
            --text-muted: #8892a0;
            --danger: #ff5c7a;
            --success: #43e97b;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            pointer-events: none;
        }

        body::before {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #22d3ee, transparent);
            top: -200px;
            left: -200px;
            animation: orb1 12s ease-in-out infinite alternate;
        }

        body::after {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -150px;
            right: -150px;
            animation: orb2 10s ease-in-out infinite alternate;
        }

        @keyframes orb1 {
            to {
                transform: translate(80px, 80px);
            }
        }

        @keyframes orb2 {
            to {
                transform: translate(-60px, -60px);
            }
        }

        .auth-card {
            position: relative;
            background: rgba(21, 25, 41, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
            animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
            justify-content: center;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
        }

        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .logo-text h1 span {
            color: var(--accent);
        }

        .logo-text p {
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .page-title {
            text-align: center;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            text-align: center;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .btn-auth {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px var(--accent-glow);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-auth.loading .btn-label {
            display: none;
        }

        .btn-auth.loading .spinner-sm {
            display: block;
        }

        .spinner-sm {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: 0.7rem 0.9rem;
            border-radius: 9px;
            font-size: 0.83rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.error {
            background: rgba(255, 92, 122, 0.12);
            border: 1px solid rgba(255, 92, 122, 0.3);
            color: var(--danger);
        }

        .alert.success {
            background: rgba(67, 233, 123, 0.1);
            border: 1px solid rgba(67, 233, 123, 0.25);
            color: var(--success);
        }

        .alert.show {
            display: block;
            animation: alertIn 0.25s ease;
        }

        @keyframes alertIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .success-check {
            text-align: center;
            margin: 1.5rem 0;
        }

        .success-check svg {
            width: 56px;
            height: 56px;
            stroke: var(--success);
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
            </div>
            <div class="logo-text">
                <h1>EventSync<span>Engine</span></h1>
                <p>Password Recovery</p>
            </div>
        </div>

        <!-- Alert -->
        <div class="alert" id="auth-alert" role="alert"></div>

        <!-- Step 1: Token present → Reset form -->
        <div id="reset-section" style="display:none;">
            <h3 class="page-title">Set New Password</h3>
            <p class="page-subtitle">Enter your new password below.</p>
            <form id="reset-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="new-password">New Password <span style="color:var(--text-muted);font-weight:400">(min 6
                            chars)</span></label>
                    <input type="password" id="new-password" placeholder="••••••••" required minlength="6" />
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6" />
                </div>
                <button type="submit" class="btn-auth" id="btn-reset">
                    <span class="btn-label">Reset Password</span>
                    <div class="spinner-sm"></div>
                </button>
            </form>
        </div>

        <!-- Step 2: No token → Forgot form (enter email) -->
        <div id="forgot-section">
            <h3 class="page-title">Forgot Password?</h3>
            <p class="page-subtitle">Enter your email and we'll send you a link to reset your password.</p>
            <form id="forgot-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="forgot-email">Email</label>
                    <input type="email" id="forgot-email" placeholder="you@example.com" required />
                </div>
                <button type="submit" class="btn-auth" id="btn-forgot">
                    <span class="btn-label">Send Reset Link</span>
                    <div class="spinner-sm"></div>
                </button>
            </form>
        </div>

        <!-- Success state -->
        <div id="success-section" style="display:none;">
            <div class="success-check">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="9 12 12 15 16 10" />
                </svg>
            </div>
            <h3 class="page-title" id="success-title">Done!</h3>
            <p class="page-subtitle" id="success-message"></p>
        </div>

        <a href="/login.html" class="back-link">← Back to Sign In</a>
    </div>

    <script>
        const alertEl = document.getElementById('auth-alert');
        const forgotSection = document.getElementById('forgot-section');
        const resetSection = document.getElementById('reset-section');
        const successSection = document.getElementById('success-section');

        function showAlert(msg, type = 'error') {
            alertEl.textContent = msg;
            alertEl.className = `alert ${type} show`;
        }
        function clearAlert() {
            alertEl.className = 'alert';
        }

        // Check if we have a reset token in the URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (token) {
            // Show the reset password form
            forgotSection.style.display = 'none';
            resetSection.style.display = '';
        }

        // ── Forgot Password Form ──────────────────────────────
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();
            const btn = document.getElementById('btn-forgot');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const email = document.getElementById('forgot-email').value.trim();
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const json = await res.json();

                forgotSection.style.display = 'none';
                successSection.style.display = '';
                document.getElementById('success-title').textContent = 'Check Your Email';
                document.getElementById('success-message').textContent = 'If an account with that email exists, we\'ve sent a password reset link. Check your inbox (and spam folder).';
            } catch (err) {
                if (err instanceof TypeError) {
                    showAlert('Cannot reach the server. Make sure it is running.');
                } else {
                    showAlert(err.message);
                }
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // ── Reset Password Form ───────────────────────────────
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlert();

            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                showAlert('Passwords do not match.');
                return;
            }
            if (password.length < 6) {
                showAlert('Password must be at least 6 characters.');
                return;
            }

            const btn = document.getElementById('btn-reset');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const json = await res.json();

                if (!json.success) {
                    showAlert(json.message);
                    return;
                }

                resetSection.style.display = 'none';
                successSection.style.display = '';
                document.getElementById('success-title').textContent = 'Password Reset!';
                document.getElementById('success-message').textContent = 'Your password has been changed successfully. You can now sign in with your new password.';
            } catch (err) {
                if (err instanceof TypeError) {
                    showAlert('Cannot reach the server. Make sure it is running.');
                } else {
                    showAlert(err.message);
                }
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
    <script src="/js/animations.js"></script>
</body>

</html>
